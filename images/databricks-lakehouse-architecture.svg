<svg viewBox="0 0 1100 552" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, Roboto, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- canvas -->
  <rect x="4" y="4" width="1092" height="544" rx="14" fill="#0a111d" stroke="#1e293b" stroke-width="1.5"/>

  <!-- title -->
  <text x="36" y="43" font-size="22" font-weight="700" fill="#e2e8f0">Retail Analytics — Medallion Architecture</text>
  <text x="36" y="65" font-size="13" fill="#7e93a8">Databricks Lakehouse · UCI Online Retail II dataset · Serverless compute</text>

  <!-- governance band -->
  <rect x="215" y="86" width="645" height="36" rx="8" fill="#14233f" stroke="#3b82f6" stroke-width="1.4"/>
  <text x="537" y="109" text-anchor="middle" font-size="12.5" fill="#93c5fd" font-weight="600">Unity Catalog governance   ·   catalog: retail_portfolio   ·   schemas: bronze / silver / gold</text>
  <!-- governance ties to layers -->
  <line x1="307.5" y1="122" x2="307.5" y2="160" stroke="#3b82f6" stroke-width="1" stroke-dasharray="3,3" opacity="0.45"/>
  <line x1="527.5" y1="122" x2="527.5" y2="160" stroke="#3b82f6" stroke-width="1" stroke-dasharray="3,3" opacity="0.45"/>
  <line x1="757.5" y1="122" x2="757.5" y2="160" stroke="#3b82f6" stroke-width="1" stroke-dasharray="3,3" opacity="0.45"/>

  <!-- pipeline boxes -->
  <!-- Source -->
  <rect x="40" y="160" width="140" height="150" rx="10" fill="#0f1a27" stroke="#64748b" stroke-width="1.6"/>
  <text x="110" y="194" text-anchor="middle" font-size="15" font-weight="700" fill="#94a3b8">Source</text>
  <text x="110" y="222" text-anchor="middle" font-size="11.5" fill="#8aa0b6">UCI Online</text>
  <text x="110" y="240" text-anchor="middle" font-size="11.5" fill="#8aa0b6">Retail II CSV</text>
  <text x="110" y="262" text-anchor="middle" font-size="11.5" fill="#8aa0b6">→ UC volume</text>

  <!-- Bronze -->
  <rect x="215" y="160" width="185" height="150" rx="10" fill="#0f1a27" stroke="#e8975a" stroke-width="1.6"/>
  <text x="307.5" y="194" text-anchor="middle" font-size="15" font-weight="700" fill="#e8975a">Bronze</text>
  <text x="307.5" y="222" text-anchor="middle" font-size="11.5" fill="#8aa0b6">Auto Loader (incremental)</text>
  <text x="307.5" y="240" text-anchor="middle" font-size="11.5" fill="#8aa0b6">raw, as-landed</text>
  <text x="307.5" y="258" text-anchor="middle" font-size="11.5" fill="#8aa0b6">Delta table</text>

  <!-- Silver -->
  <rect x="435" y="160" width="185" height="150" rx="10" fill="#0f1a27" stroke="#cbd5e1" stroke-width="1.6"/>
  <text x="527.5" y="194" text-anchor="middle" font-size="15" font-weight="700" fill="#cbd5e1">Silver · dbt</text>
  <text x="527.5" y="222" text-anchor="middle" font-size="11.5" fill="#8aa0b6">typed · deduped</text>
  <text x="527.5" y="240" text-anchor="middle" font-size="11.5" fill="#8aa0b6">cancellations &amp;</text>
  <text x="527.5" y="258" text-anchor="middle" font-size="11.5" fill="#8aa0b6">non-positive dropped</text>

  <!-- Gold -->
  <rect x="655" y="160" width="205" height="150" rx="10" fill="#0f1a27" stroke="#f4c542" stroke-width="1.6"/>
  <text x="757.5" y="194" text-anchor="middle" font-size="15" font-weight="700" fill="#f4c542">Gold · dbt marts</text>
  <text x="757.5" y="222" text-anchor="middle" font-size="11.5" fill="#8aa0b6">fct_sales (line grain)</text>
  <text x="757.5" y="240" text-anchor="middle" font-size="11.5" fill="#8aa0b6">dim_customers (RFM)</text>
  <text x="757.5" y="258" text-anchor="middle" font-size="11.5" fill="#8aa0b6">revenue_by_country</text>

  <!-- BI & SQL -->
  <rect x="895" y="160" width="165" height="150" rx="10" fill="#0f1a27" stroke="#4fc3f7" stroke-width="1.6"/>
  <text x="977.5" y="194" text-anchor="middle" font-size="15" font-weight="700" fill="#4fc3f7">BI &amp; SQL</text>
  <text x="977.5" y="226" text-anchor="middle" font-size="11.5" fill="#8aa0b6">dashboards,</text>
  <text x="977.5" y="244" text-anchor="middle" font-size="11.5" fill="#8aa0b6">ad-hoc queries</text>

  <!-- flow arrows -->
  <line x1="182" y1="235" x2="210" y2="235" stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="402" y1="235" x2="430" y2="235" stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="622" y1="235" x2="650" y2="235" stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="862" y1="235" x2="890" y2="235" stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- orchestration ties -->
  <line x1="307.5" y1="310" x2="307.5" y2="372" stroke="#22c55e" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="527.5" y1="310" x2="527.5" y2="372" stroke="#22c55e" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="757.5" y1="310" x2="757.5" y2="372" stroke="#22c55e" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>

  <!-- orchestration band -->
  <rect x="215" y="372" width="645" height="42" rx="8" fill="#10271a" stroke="#22c55e" stroke-width="1.4"/>
  <text x="537" y="392" text-anchor="middle" font-size="12.5" fill="#86efac" font-weight="600">Databricks Asset Bundle</text>
  <text x="537" y="407" text-anchor="middle" font-size="11" fill="#5fae79">job: ingest_bronze → dbt_build  ·  dependency enforced  ·  scheduled (paused)</text>

  <!-- CI band -->
  <rect x="215" y="430" width="645" height="42" rx="8" fill="#1e1733" stroke="#a78bfa" stroke-width="1.4"/>
  <text x="537" y="450" text-anchor="middle" font-size="12.5" fill="#c4b5fd" font-weight="600">GitHub Actions CI</text>
  <text x="537" y="465" text-anchor="middle" font-size="11" fill="#9a86d6">dbt parse on every PR (no warehouse)  ·  dbt build + 24 tests on demand</text>

  <!-- footer -->
  <text x="36" y="506" font-size="11.5" fill="#6b7f93">Bronze: Auto Loader incremental ingest into a UC volume  ·  Silver / Gold: dbt models with data-quality tests at every layer.</text>
  <text x="36" y="524" font-size="11.5" fill="#6b7f93">All compute Serverless  ·  tables stored as Delta  ·  24 tests gate every build.</text>
</svg>
